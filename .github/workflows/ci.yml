name: CI
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
jobs:
  logic-tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ejecutar arnés de lógica pura
        run: python tools/tests/run_all.py
      - name: Regenerar y validar tabla de particiones
        run: python tools/partition-gen/partition_gen.py
  automerge:
    name: Auto-Merge to main
    needs: [logic-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge develop into main and push
        if: github.event_name == 'push' && github.ref_name == 'develop'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-ff develop -m "Auto-merge develop to main"
          git push origin main
