[build]
target = "xtensa-esp32s3-none-elf"

# The linker script is GENERATED by kernel/build.rs into .slots/espresso.x, because
# it has to agree with mm::psram_exec's slot geometry. There is deliberately no
# checked-in copy: there used to be a userland/user.x, and since `-Tuser.x` has no
# directory component ld resolved it from the current directory instead of the -L
# path, so the checked-in one silently won and the generated one was dead. The two
# had drifted 64 KB apart. Hence the path with a slash below -- it is used as-is,
# never searched.
#
# kernel/build.rs overrides RUSTFLAGS anyway; this exists so that building userland
# on its own uses the same script rather than a second source of truth.
rustflags = [
  "-C", "link-arg=-nostartfiles",
  "-C", "force-frame-pointers",
  "-C", "link-arg=-T.slots/espresso.x",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
